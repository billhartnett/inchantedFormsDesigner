
name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # -------------------------
      # Build shared TypeScript package
      # -------------------------
      - name: Install shared dependencies
        working-directory: shared
        run: npm install

      - name: Build shared package
        working-directory: shared
        run: npm run build

      # -------------------------
      # Build frontend (Vite)
      # -------------------------
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # -------------------------
      # Build backend (Azure Functions)
      # -------------------------
      - name: Install backend dependencies
        working-directory: backend/api
        run: npm install

      # -------------------------
      # Deploy using SWA action
      # -------------------------
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"

          # IMPORTANT: These MUST match your monorepo layout
          app_location: "frontend"
          api_location: "backend/api"
          output_location: "frontend/dist"

          # Disable Oryx completely
          skip_app_build: true
          app_build_command: ""
